name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # @ntag424/crypto is a file:../ntag424-crypto dependency
      # Clone and build it so npm ci + typecheck can resolve the module
      - name: Clone ntag424-crypto
        run: git clone https://github.com/Amperstrand/ntag424-crypto.git ../ntag424-crypto
      - name: Build ntag424-crypto
        run: cd ../ntag424-crypto && npm install && npm run build
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/sync-js-exports.mjs
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run test:do
      - run: npm run test:integration

  smoke:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/live-smoke-test.mjs https://boltcardpoc.psbt.me
