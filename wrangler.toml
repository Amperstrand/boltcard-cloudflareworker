name = "boltcard-poc"
main = "index.ts"
compatibility_date = "2026-06-10"
workers_dev = false

[assets]
directory = "./public"

kv_namespaces = [
  { binding = "UID_CONFIG", id = "7eaddc7f33d242ed94054dfb8da8fcbc" }
]

# Rate limiting via KV is disabled by default. To enable, create a KV namespace
# and add: { binding = "RATE_LIMITS", id = "<your-namespace-id>" }
# The worker gracefully skips rate limiting when the binding is absent.

[vars]
CURRENCY_LABEL = "credits"
CURRENCY_DECIMALS = "0"
FAKEWALLET_CURRENCY = "EUR"
FAKEWALLET_IBAN = "GB33BUKB20201555555555"
FAKEWALLET_ACCOUNT_NAME = "FakeWallet"

routes = [
  "https://boltcardpoc.psbt.me/*"
]

[[durable_objects.bindings]]
name = "CARD_REPLAY"
class_name = "CardReplayDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CardReplayDO"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[env.staging]
name = "boltcard-poc-staging"
workers_dev = false
routes = [
  "https://boltcard-staging.psbt.me/*"
]
kv_namespaces = [
  { binding = "UID_CONFIG", id = "b692f3eb3e2d4c11b57afae6713c0b2a" }
]

[env.staging.vars]
CURRENCY_LABEL = "credits"
CURRENCY_DECIMALS = "0"
FAKEWALLET_CURRENCY = "EUR"
FAKEWALLET_IBAN = "GB33BUKB20201555555555"
FAKEWALLET_ACCOUNT_NAME = "FakeWallet"

[[env.staging.durable_objects.bindings]]
name = "CARD_REPLAY"
class_name = "CardReplayDO"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["CardReplayDO"]

[env.staging.observability]
enabled = true
